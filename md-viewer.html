<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD Viewer</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root{
      --orange:#FF6B00;
      --orange-light:#FF8C42;
      --bg:#0a0a0b;
      --surface:#141416;
      --border:rgba(255,255,255,0.08);
      --text:#e8e8ea;
      --muted:#8b8b93;
      --code-bg:#1a1a1a;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.7;
      padding: 1.25rem;
    }
    header{
      max-width: 980px;
      margin: 0 auto 1rem auto;
      padding: 0.75rem 1rem;
      background: linear-gradient(145deg, var(--surface), #101012);
      border: 1px solid var(--border);
      border-radius: 14px;
      display:flex;
      gap:0.75rem;
      align-items:center;
      flex-wrap:wrap;
      justify-content: space-between;
    }
    header .title{
      display:flex;
      gap:0.75rem;
      align-items:center;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--orange);
      box-shadow:0 0 20px rgba(255,107,0,0.5);
    }
    header h1{
      font-size: 1rem;
      letter-spacing: -0.02em;
    }
    header .path{
      color: var(--muted);
      font-size: 0.9rem;
      word-break: break-all;
    }
    main{
      max-width: 980px;
      margin: 0 auto;
      background: linear-gradient(145deg, var(--surface), #101012);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      overflow: auto;
      min-height: 70vh;
    }
    main pre, main code{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    main pre{
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1rem;
      overflow:auto;
    }
    main code{
      background: rgba(255,107,0,0.08);
      border: 1px solid rgba(255,107,0,0.18);
      padding: 0.12rem 0.35rem;
      border-radius: 8px;
      white-space: nowrap;
    }
    a{color: var(--orange-light)}
    a:hover{filter: brightness(1.05)}
    .empty{
      color: var(--muted);
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <header>
    <div class="title">
      <span class="dot" aria-hidden="true"></span>
      <h1>Markdown 뷰어</h1>
    </div>
    <div class="path" id="pathLabel"></div>
  </header>
  <main>
    <article id="content" class="empty">로딩 중...</article>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const path = params.get('path');
      const pathLabel = document.getElementById('pathLabel');
      const content = document.getElementById('content');

      if (!path) {
        pathLabel.textContent = '(path 미지정)';
        content.textContent = 'path 파라미터가 필요합니다. 예: md-viewer.html?path=week01/대본.md';
        return;
      }

      const url = new URL(path, window.location.href).toString();
      pathLabel.textContent = url;

      fetch(url)
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.arrayBuffer();
        })
        .then(buf => {
          // 서버가 charset을 안 주는 경우를 대비해 UTF-8로 강제 디코딩
          const text = new TextDecoder('utf-8').decode(new Uint8Array(buf));
          const safeHtml = (window.marked?.parse)
            ? window.marked.parse(text, { gfm: true, breaks: true })
            : '<pre>' + escapeHtml(text) + '</pre>';
          content.innerHTML = safeHtml;
          document.querySelectorAll('a[href^="http"]').forEach(function (a) {
            a.setAttribute('target', '_blank');
            a.setAttribute('rel', 'noopener');
          });
        })
        .catch(err => {
          content.innerHTML = '<pre>' + escapeHtml(String(err)) + '</pre>';
        });

      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, function (c) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[c];
        });
      }
    })();
  </script>
</body>
</html>
